version: "3.8"

services:
  blog:
    build: .
    container_name: easy-blog
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # 如果要启用 GitHub 登录，把下面的 Client ID 填上
      # - GITHUB_CLIENT_ID=你的GitHubClientID
    volumes:
      # 数据库文件：确保不随容器重建丢失
      - blog-data:/app/backend/data
      # 上传的头像和博客图片
      - blog-uploads:/app/backend/uploads

volumes:
  blog-data:
  blog-uploads:
